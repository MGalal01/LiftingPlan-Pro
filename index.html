  .dark-section-label { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: #f59e0b; letter-spacing: 3px; }
  .dark-stat { background: #080f1e; border: 1px solid var(--dark-border); border-radius: 8px; padding: 14px 16px; }
  .dark-stat-label { font-size: 9px; color: #475569; letter-spacing: 2px; margin-bottom: 6px; }
  .dark-stat-value { font-size: 14px; font-weight: 700; color: #e2e8f0; }
  .acc-pill { border: 1px solid var(--dark-border); cursor: pointer; transition: all 0.15s; border-radius: 6px; padding: 8px 16px; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 1px; }
  .acc-pill.active { background: #0d2240; color: #f59e0b; border-color: #f59e0b; }
  .acc-pill:not(.active) { background: #07111f; color: #64748b; }
  .acc-pill:hover:not(.active) { border-color: #f59e0b; }
  .dark-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dark-table th { background: #0a1a2e; padding: 10px 14px; color: #64748b; font-weight: 700; font-size: 10px; letter-spacing: 2px; border-bottom: 1px solid var(--dark-border); white-space: nowrap; }
  .dark-table td { padding: 9px 14px; border-bottom: 1px solid #0d1a2e; transition: background 0.1s; }
  .dark-table tr:hover td { background: #0d1f35; }
  .upload-zone { border: 2px dashed var(--dark-border); border-radius: 10px; padding: 44px 24px; text-align: center; cursor: pointer; background: #07111f; transition: all 0.2s; margin-bottom: 24px; }
  .upload-zone:hover { border-color: #f59e0b; background: #0a1628; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate-up { animation: fadeUp 0.3s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn 0.35s ease forwards; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin { animation: spin 1.2s linear infinite; display: inline-block; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d1f35; }
  ::-webkit-scrollbar-thumb { background: #1e4d7a; border-radius: 3px; }
  @media (max-width: 900px) { .wizard-layout { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr; } .plans-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } .dark-content { padding: 16px; } }

// ─── CRANE HELPERS ─────────────────────────────────────────────────────────────
function getCapacityAtRadius(craneModel, config, radiusM) {
  const crane = CRANE_DATABASE[craneModel]; if (!crane) return null;
  const chart = crane.configs[config]; if (!chart) return null;
  const radii = Object.keys(chart).map(Number).sort((a, b) => a - b);
  const r = radiusM;
  if (chart[r] !== undefined) return chart[r];
  const lower = [...radii].reverse().find(x => x <= r);
  const upper = radii.find(x => x > r);
  if (lower === undefined) return chart[radii[0]];
  if (upper === undefined) return null;
  const t = (r - lower) / (upper - lower);
  return chart[lower] + t * (chart[upper] - chart[lower]);
}
function getMinRadius(craneModel, config) {
  const crane = CRANE_DATABASE[craneModel];
  if (!crane || !crane.configs[config]) return 3;
  return Math.min(...Object.keys(crane.configs[config]).map(Number));
}
function getMaxRadius(craneModel, config) {
  const crane = CRANE_DATABASE[craneModel];
  if (!crane || !crane.configs[config]) return 50;
  return Math.max(...Object.keys(crane.configs[config]).map(Number));
}

  const [saveStatus, setSaveStatus] = useState("All changes saved");

  const updatePlan = useCallback((path, value) => {
    setSaveStatus("Saving…");
    setPlanData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
      obj[keys[keys.length - 1]] = value;
      return next;
    });
    setTimeout(() => setSaveStatus("All changes saved"), 800);
  }, []);

  const STEP_LABELS = ["Project","Personnel","Load","Equipment","Lift Zone","Risk","Method","Sign-Off"];

// ─── STEP 4 ───────────────────────────────────────────────────────────────────
function Step4({ data, update }) {
  const selectedCrane = CRANE_DATABASE[data.craneModel];
  const configs = selectedCrane ? Object.keys(selectedCrane.configs) : [];
  const radii = selectedCrane && data.config && selectedCrane.configs[data.config]
    ? Object.keys(selectedCrane.configs[data.config]).map(Number).sort((a,b)=>a-b)
    : [];
  const weightT = 38.5;

  const handleCraneChange = (model) => {
    const crane = CRANE_DATABASE[model];
    update("craneModel", model);
    if (crane) {
      update("swl", crane.maxSWL);
      update("config", Object.keys(crane.configs)[0]);
      update("craneType", crane.type);
    }
  };

  return (
    <div>
      <div className="form-section">
        <div className="form-section-title">Crane Selection — Database ({Object.keys(CRANE_DATABASE).length} models)</div>
        <div className="form-grid">
          <div className="form-group form-full">
            <label className="form-label">Crane Model <span className="required">*</span></label>
            <select className="form-select" value={data.craneModel} onChange={e=>handleCraneChange(e.target.value)}>
              <option value="">— Select Crane from Database —</option>
              {["mobile","crawler","tower","lattice","overhead"].map(type=>(
                <optgroup key={type} label={`── ${type.toUpperCase()} CRANES ──`}>
                  {Object.entries(CRANE_DATABASE).filter(([,c])=>c.type===type).map(([name,c])=>(
                    <option key={name} value={name}>{name} — Max {c.maxSWL}T</option>
                  ))}
                </optgroup>
              ))}
            </select>
          </div>
          {selectedCrane && (
            <>
              <div className="form-group form-full">
                <label className="form-label">Configuration</label>
                <select className="form-select" value={data.config} onChange={e=>update("config",e.target.value)}>
                  {configs.map(cfg=><option key={cfg} value={cfg}>{cfg}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Max SWL</label><input className="form-input" value={`${selectedCrane.maxSWL} Tonnes`} readOnly style={{opacity:0.8}}/></div>
              <div className="form-group"><label className="form-label">Crane Type</label><input className="form-input" value={selectedCrane.type.toUpperCase()} readOnly style={{opacity:0.8}}/></div>
              <div className="form-group form-full"><label className="form-label">Crane Specification</label><input className="form-input" value={selectedCrane.specs} readOnly style={{opacity:0.7,fontSize:12}}/></div>
            </>
          )}
          <div className="form-group">
            <label className="form-label">Working Radius (m)</label>
            <input className="form-input" type="number" min={getMinRadius(data.craneModel,data.config)} max={getMaxRadius(data.craneModel,data.config)} value={data.radius} onChange={e=>update("radius",+e.target.value)}/>
          </div>
        </div>
      </div>
      {selectedCrane && data.config && (
        <div className="form-section">
          <div className="form-section-title">Load Chart — {data.craneModel} / {data.config}</div>
          <div style={{overflowX:"auto"}}>
            <table className="personnel-table">
              <thead><tr><th>Radius (m)</th><th>Capacity (T)</th><th>Load 38.5T = % SWL</th><th>Status</th></tr></thead>
              <tbody>
                {radii.map(r=>{
                  const cap = selectedCrane.configs[data.config][r];
                  const pct = ((weightT/cap)*100).toFixed(1);
                  const isActive = data.radius===r;
                  const color = pct<75?"var(--green)":pct<90?"var(--amber)":"var(--red)";
                  return (
                    <tr key={r} style={{background:isActive?"rgba(245,195,0,0.1)":""}} onClick={()=>update("radius",r)} title="Click to select radius">
                      <td style={{fontWeight:isActive?700:400,cursor:"pointer"}}>{r}m {isActive?"◄":""}</td>
                      <td style={{fontWeight:600}}>{cap.toFixed(1)} T</td>
                      <td><span style={{fontFamily:"var(--font-display)",fontSize:13,fontWeight:700,color}}>{pct}%</span></td>
                      <td><span style={{fontFamily:"var(--font-display)",fontSize:11,fontWeight:700,color}}>{pct<75?"✅ SAFE":pct<90?"⚠ CAUTION":"⛔ OVER"}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="alert alert-yellow" style={{marginTop:12}}>💡 Click any row to set working radius. Capacity interpolated from published load chart data.</div>
        </div>
      )}
      <div className="form-section">
        <div className="form-section-title">Rigging Gear</div>
        <div style={{marginBottom:12}}>
          <div className="equip-cat-title">Slings & Lifting Gear</div>
          <div className="equip-options">
            {RIGGING_GEAR.map(g=>(
              <div key={g} className={`equip-option ${data.rigging?.includes(g)?"selected":""}`}
                onClick={()=>{const c=data.rigging||[];update("rigging",c.includes(g)?c.filter(x=>x!==g):[...c,g]);}}>
                {g}
              </div>
            ))}
          </div>
        </div>
        <div>
          <div className="equip-cat-title">Shackles</div>
          <div className="equip-options">
            {SHACKLES_LIST.map(s=>(
              <div key={s} className={`equip-option ${data.shackles?.includes(s)?"selected":""}`}
                onClick={()=>{const c=data.shackles||[];update("shackles",c.includes(s)?c.filter(x=>x!==s):[...c,s]);}}>
                {s}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── STEP 6 ───────────────────────────────────────────────────────────────────
function Step6({ risks }) {
  const getRiskLevel = s => s<=4?"low":s<=9?"medium":s<=16?"high":"critical";
  return (
    <div>
      <div className="form-section">
        <div className="form-section-title">Risk Matrix (5×5)</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
          <div>
            <div style={{fontFamily:"var(--font-display)",fontSize:11,color:"var(--gray-400)",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Likelihood → / Severity ↑</div>
            <div style={{display:"grid",gridTemplateColumns:"auto repeat(5, 32px)",gap:3,alignItems:"center"}}>
              <div/>
              {[1,2,3,4,5].map(l=><div key={l} style={{textAlign:"center",fontFamily:"var(--font-display)",fontSize:10,fontWeight:700,color:"var(--gray-400)"}}>L{l}</div>)}
              {[5,4,3,2,1].map(sev=>(
                <React.Fragment key={sev}>
                  <div style={{fontFamily:"var(--font-display)",fontSize:10,fontWeight:700,color:"var(--gray-400)",paddingRight:6}}>S{sev}</div>
                  {[1,2,3,4,5].map(lik=>{
                    const score=lik*sev;
                    const colors={low:"#2ECC71",medium:"#F39C12",high:"#E74C3C",critical:"#8B0000"};
                    return <div key={`${sev}-${lik}`} style={{width:32,height:32,background:colors[getRiskLevel(score)],borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-display)",fontSize:10,fontWeight:700,color:"white"}}>{score}</div>;
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div style={{flex:1}}>
            {[{l:"LOW ≤4",c:"var(--green)",d:"Monitor, routine controls"},{l:"MEDIUM 5–9",c:"var(--amber)",d:"Control measures required"},{l:"HIGH 10–16",c:"var(--red)",d:"Significant controls, AP oversight"},{l:"CRITICAL ≥17",c:"#8B0000",d:"STOP — Senior AP authorisation"}].map(r=>(
              <div key={r.l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{width:14,height:14,background:r.c,borderRadius:2,flexShrink:0}}/>
                <div><div style={{fontFamily:"var(--font-display)",fontSize:12,fontWeight:700,color:r.c}}>{r.l}</div><div style={{fontSize:11,color:"var(--gray-600)"}}>{r.d}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="form-section">
        <div className="form-section-title">Hazard Register</div>
        <div className="scrollable">
          {risks.map(r=>{
            const score=r.likelihood*r.severity; const level=getRiskLevel(score); const resScore=r.residual*2;
            return (
              <div key={r.id} className={`hazard-card ${level}`}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div className="hazard-title">{r.hazard}</div>
                  <div style={{display:"flex",gap:4,marginLeft:8,flexShrink:0}}>
                    <span className={`risk-pill risk-${level}`}>Initial: {score}</span>
                    <span className={`risk-pill risk-${getRiskLevel(resScore)}`}>Residual: {resScore}</span>
                  </div>
                </div>
                <div style={{fontSize:12,color:"var(--navy)",lineHeight:1.5}}><strong>Controls:</strong> {r.control}</div>
              </div>
            );
          })}
        </div>
        <button className="btn-secondary" style={{marginTop:12,fontSize:13}}>+ Add Hazard</button>
      </div>
    </div>
  );
}

function Step8({ planData, onFinish }) {

  const sections = [
    { key:"project",   label:"Project & Site", fields:[["Project",planData.project.name],["Site",planData.project.site],["Client",planData.project.client],["Lift Date",planData.project.date],["Start Time",planData.project.time]] },
    { key:"personnel", label:"Personnel",      fields:[["AP",planData.personnel.ap.name],["AP Cert",planData.personnel.ap.cert],["Operator",planData.personnel.operator.name],["Banksman",planData.personnel.banksman?.split("—")[0]]] },
    { key:"load",      label:"Load & Equipment", fields:[["Description",planData.load.description],["Weight",`${planData.load.weight.toLocaleString()} kg`],["Crane",planData.equipment.craneModel],["Config",planData.equipment.config],["Radius",`${planData.equipment.radius}m`]] },
  ];
  return (
    <div>
      <div className="alert alert-green">✅ Lifting Plan LP-2025-0863 ready for sign-off. All 7 sections completed.</div>
      {sections.map(sec=>(
        <div key={sec.key} className="review-section">
          <div className="review-section-header" onClick={()=>setOpen(open===sec.key?null:sec.key)}>
            <span>{sec.label}</span><span>{open===sec.key?"▲":"▼"}</span>
          </div>

// ─── SIDEBAR: CAPACITY CALCULATOR ─────────────────────────────────────────────
function CapacityCalculator({ equipment, loadWeight }) {
  const [radius, setRadius] = useState(equipment.radius||18);
  const minR = getMinRadius(equipment.craneModel,equipment.config);
  const maxR = getMaxRadius(equipment.craneModel,equipment.config);
  const capAtRadius = getCapacityAtRadius(equipment.craneModel,equipment.config,radius);
  const weightT = (loadWeight||38500)/1000;
  const pct = capAtRadius ? Math.min((weightT/capAtRadius)*100,200) : 0;
  const status = !capAtRadius?"red":pct<75?"green":pct<90?"amber":"red";
  const statusText = !capAtRadius?"BEYOND RANGE":pct<75?"SAFE":pct<90?"CAUTION":"OVERLOAD ⛔";
  const colors = { green:"var(--green)", amber:"var(--amber)", red:"var(--red)" };
  return (
    <div className="sidebar-card">
      <div className="sidebar-card-header">⚖ Live Capacity Calculator</div>
      <div className="sidebar-card-body">
        <div style={{marginBottom:8}}>
          <div style={{fontFamily:"var(--font-display)",fontSize:11,fontWeight:600,color:"var(--navy)",marginBottom:4}}>{equipment.craneModel||"No crane selected"}</div>
          <div style={{fontSize:10,color:"var(--gray-400)"}}>{equipment.config||"—"}</div>
        </div>
        <div className="calc-label">Working Radius: {radius}m (range: {minR}–{maxR}m)</div>
        <input type="range" min={minR} max={maxR} step={1} value={radius} onChange={e=>setRadius(+e.target.value)} style={{width:"100%",accentColor:"var(--yellow)",margin:"6px 0"}}/>
        <div className="capacity-bar">
          <div className="capacity-fill" style={{width:`${Math.min(pct,100)}%`,background:colors[status]}}/>
        </div>
        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontFamily:"var(--font-display)",fontSize:36,fontWeight:900,color:colors[status]}}>{capAtRadius?`${pct.toFixed(1)}%`:"N/A"}</div>
          <div style={{fontFamily:"var(--font-display)",fontSize:13,fontWeight:700,color:colors[status],letterSpacing:2}}>{statusText}</div>
          {capAtRadius && <div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>{weightT.toFixed(2)}T of {capAtRadius.toFixed(1)}T rated @ {radius}m</div>}
          {!capAtRadius && <div style={{fontSize:11,color:"var(--red)",marginTop:2}}>Radius {radius}m exceeds crane range</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[["Crane Capacity",capAtRadius?`${capAtRadius.toFixed(1)} T`:"N/A"],["Load Weight",`${weightT.toFixed(2)} T`],["Headroom",capAtRadius?`${Math.max(capAtRadius-weightT,0).toFixed(1)} T`:"—"],["Utilisation",capAtRadius?`${pct.toFixed(0)}%`:"—"]].map(([l,v])=>(
            <div key={l} style={{background:"var(--gray-100)",padding:"6px 8px",borderRadius:3}}>
              <div style={{fontSize:10,color:"var(--gray-400)",textTransform:"uppercase",letterSpacing:1}}>{l}</div>
              <div style={{fontFamily:"var(--font-display)",fontSize:13,fontWeight:700,color:"var(--navy)"}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── SIDEBAR: SLING ANGLE ─────────────────────────────────────────────────────
function SlingAngleDiagram() {
  const [angle, setAngle] = useState(60);
  const rad = (angle*Math.PI)/180;
  const tension = (38.5/(2*Math.cos(rad))).toFixed(1);
  const derating = angle>=60?1.0:angle>=45?0.866:angle>=30?0.707:0.5;
  const spread = Math.min(2*60*Math.cos(rad),110);
  const cx = 150;
  return (
    <div className="sidebar-card">
      <div className="sidebar-card-header">📐 Sling Angle Visualizer</div>
      <div className="sidebar-card-body">
        <svg viewBox="0 0 300 150" style={{width:"100%"}}>
          <circle cx={cx} cy={20} r="7" fill="var(--navy)"/>
          <text x={cx} y={11} textAnchor="middle" fontFamily="Barlow Condensed" fontSize="9" fill="var(--gray-600)">HOOK</text>
          <line x1={cx} y1={27} x2={cx-spread/2} y2={112} stroke="var(--yellow)" strokeWidth="3" strokeLinecap="round"/>
          <line x1={cx} y1={27} x2={cx+spread/2} y2={112} stroke="var(--yellow)" strokeWidth="3" strokeLinecap="round"/>
          <rect x={cx-38} y={112} width="76" height="26" fill="var(--navy)" rx="2"/>
          <text x={cx} y={129} textAnchor="middle" fontFamily="Barlow Condensed" fontSize="10" fill="white" fontWeight="700">LOAD 38.5T</text>
          <text x={cx-16} y={46} fontFamily="Barlow Condensed" fontSize="12" fill="var(--red)" fontWeight="700">{angle}°</text>
          <text x={cx-spread/4-30} y={(27+112)/2} fontFamily="Barlow Condensed" fontSize="10" fill="var(--yellow)" fontWeight="700">{tension}T</text>
          <text x={cx+spread/4+2} y={(27+112)/2} fontFamily="Barlow Condensed" fontSize="10" fill="var(--yellow)" fontWeight="700">{tension}T</text>
        </svg>
        <input type="range" min="15" max="85" value={angle} onChange={e=>setAngle(+e.target.value)} style={{width:"100%",accentColor:"var(--yellow)"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
          {[["Sling Angle",`${angle}°`],["De-rating",`× ${derating.toFixed(3)}`],["Leg Tension",`${tension} T`],["Min Angle","≥30° (rec ≥45°)"]].map(([l,v])=>(
            <div key={l} style={{background:"var(--gray-100)",padding:"5px 8px",borderRadius:3}}>
              <div style={{fontSize:10,color:"var(--gray-400)",textTransform:"uppercase",letterSpacing:1}}>{l}</div>
              <div style={{fontFamily:"var(--font-display)",fontSize:12,fontWeight:700,color:angle<30?"var(--red)":"var(--navy)"}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CraneAnalysisTab() {

  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("liftplan_api_key") || ""; } catch(e) { return ""; } });
  const [keyVisible, setKeyVisible] = useState(false);
  const [keySaved, setKeySaved] = useState(false);
  const fileInputRef = useRef(null);

  const saveKey = () => {
    if (!apiKey.trim()) return;
    try { localStorage.setItem("liftplan_api_key", apiKey.trim()); } catch(e) {}
    setKeySaved(true);
    setTimeout(() => setKeySaved(false), 2500);
  };

  const handleFileUpload = useCallback(async (file) => {
    if (!file) return;
    let key = apiKey.trim();
    try { key = localStorage.getItem("liftplan_api_key") || key; } catch(e) {}
    if (!key) {
      setError("Please enter and save your Anthropic API key above before uploading.");
      return;
    }
    setCraneFile(file); setLoading(true); setError(null); setCraneData(null);
    try {
      const base64 = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result.split(",")[1]);
        r.onerror = ()=>rej(new Error("File read failed"));
        r.readAsDataURL(file);
      });
      const isImage = file.type.startsWith("image/");
      const mediaType = isImage ? file.type : "application/pdf";
      const systemPrompt = `You are an expert lifting equipment engineer with deep knowledge of LEEA standards. Extract ALL relevant data from this crane/lifting equipment data sheet and return ONLY a valid JSON object. No preamble or markdown.
Return this exact structure:
{"equipmentName":"string","manufacturer":"string","serialNumber":"string","model":"string","capacity":{"value":number,"unit":"t"},"span":{"value":number,"unit":"m"},"liftHeight":{"value":number,"unit":"m"},"craneType":"string","hoistSpeed":{"value":number,"unit":"m/min"},"traverseSpeed":{"value":number,"unit":"m/min"},"travelSpeed":{"value":number,"unit":"m/min"},"power":{"value":number,"unit":"kW"},"voltage":"string","dutyCycle":"string","weight":{"value":number,"unit":"t"},"manufacturer_date":"string","nextInspection":"string","swlChart":[{"radius":number,"swl":number}],"hoistMotor":{"power":number,"speed":number},"classification":"string","safetyDevices":["string"],"certifications":["string"],"additionalNotes":"string","rawExtracted":["string"]}
Use null for any field not found.`;
      const contentBlock = isImage
        ? { type:"image", source:{ type:"base64", media_type:mediaType, data:base64 } }
        : { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } };
      const response = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": key,
          "anthropic-version":"2023-06-01",

      const data = await response.json();
      const text = data.content?.map(i=>i.text||"").join("")||"";

    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, [apiKey]);

  const handleDrop = useCallback((e)=>{ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) handleFileUpload(f); },[handleFileUpload]);

  return (
    <LeaTabShell>
      <div className="fade-in">
        <div style={{marginBottom:20}}>
          <h2 style={{fontFamily:"var(--font-display)",fontSize:22,fontWeight:800,color:"#f59e0b",margin:0,letterSpacing:2}}>CRANE DATA SHEET ANALYSIS</h2>
          <p style={{color:"#64748b",fontSize:12,margin:"4px 0 0",letterSpacing:1,fontFamily:"var(--font-mono)"}}>Upload a crane data sheet (PDF or image) — AI extracts all technical parameters automatically</p>
        </div>

        {/* API KEY INPUT */}
        <div style={{background:"#07111f",border:"1px solid #1e3a5f",borderLeft:"3px solid #f59e0b",borderRadius:"0 8px 8px 0",padding:"16px 20px",marginBottom:20}}>
          <div style={{fontFamily:"var(--font-display)",fontSize:12,fontWeight:700,color:"#f59e0b",letterSpacing:3,marginBottom:10}}>🔑 ANTHROPIC API KEY</div>
          <p style={{fontSize:11,color:"#64748b",fontFamily:"var(--font-mono)",marginBottom:12,lineHeight:1.7}}>
            Required for AI analysis. Get a free key at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:"#22d3ee"}}>console.anthropic.com</a> → API Keys. Stored in your browser only — never sent anywhere except Anthropic directly.

            <input

// ─── LIFT DIAGRAM SVG ─────────────────────────────────────────────────────────
function LiftDiagram({ legs, angleDeg, load, tension, swl }) {
  const W=340, H=320, cx=W/2, hookY=52;
  const loadW=100, loadH=44, loadY=H-60;
  const overload = tension>swl && swl>0;
  const nearLimit = tension>swl*0.85 && swl>0;
  const statusColor = overload?"#ef4444":nearLimit?"#f59e0b":"#22d3ee";
  const angleRad = (angleDeg*Math.PI)/180;
  const spreadX = Math.sin(angleRad)*(loadY-hookY-20);
  const attachY = loadY-14;
  const legPoints = legs===1?[{x:cx,y:attachY}]:legs===2?[{x:cx-spreadX,y:attachY},{x:cx+spreadX,y:attachY}]:legs===3?[{x:cx,y:attachY},{x:cx-spreadX*0.87,y:attachY},{x:cx+spreadX*0.87,y:attachY}]:[{x:cx-spreadX,y:attachY},{x:cx+spreadX,y:attachY},{x:cx-spreadX*0.5,y:attachY},{x:cx+spreadX*0.5,y:attachY}];
  const legColor = overload?"#ef4444":"#f59e0b";
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxHeight:320}}>
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e3a5f" strokeWidth="0.5"/></pattern>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect width={W} height={H} fill="#0a1628" rx="8"/>
      <rect width={W} height={H} fill="url(#grid)" rx="8"/>
      <rect x={cx-70} y={10} width={140} height={18} rx="3" fill="#1e3a5f" stroke="#334e7a" strokeWidth="1"/>
      <rect x={cx-2} y={28} width={4} height={hookY-28} fill="#334e7a"/>
      <circle cx={cx} cy={hookY} r={10} fill="#1e3a5f" stroke={statusColor} strokeWidth="2" filter="url(#glow)"/>
      <path d={`M ${cx} ${hookY-4} Q ${cx+10} ${hookY} ${cx+4} ${hookY+8}`} fill="none" stroke={statusColor} strokeWidth="2.5" strokeLinecap="round"/>
      {legPoints.map((pt,i)=>(
        <g key={i}>
          <line x1={cx} y1={hookY+10} x2={pt.x} y2={pt.y} stroke={legColor} strokeWidth="2.5" strokeDasharray={overload?"6,3":"none"}/>
          {legs>1&&<text x={(cx+pt.x)/2+(i%2===0?-28:12)} y={(hookY+pt.y)/2} fill="#94a3b8" fontSize="10" fontFamily="monospace">{tension.toFixed(2)}t</text>}
        </g>
      ))}
      {legs>1&&<text x={cx-55} y={hookY+70} fill="#64748b" fontSize="10" fontFamily="monospace">{angleDeg}° from vert.</text>}
      <rect x={cx-loadW/2} y={loadY} width={loadW} height={loadH} rx="4" fill="#132237" stroke="#1e3a5f" strokeWidth="2"/>
      <text x={cx} y={loadY+loadH/2+5} textAnchor="middle" fill="#e2e8f0" fontSize="13" fontWeight="bold" fontFamily="monospace">{load} t</text>
      <rect x={cx-55} y={4} width={110} height={22} rx="4" fill={overload?"#3b1010":nearLimit?"#3b2a00":"#0a2a1e"} stroke={statusColor} strokeWidth="1"/>
      <text x={cx} y={19} textAnchor="middle" fill={statusColor} fontSize="11" fontWeight="bold" fontFamily="monospace">{overload?"⚠ OVERLOAD":nearLimit?"⚠ NEAR LIMIT":"✓ WITHIN SWL"}</text>
    </svg>
  );
}

// ─── TAB: LOAD CALCULATOR ─────────────────────────────────────────────────────
function LoadCalculatorTab() {
  const [loadWeight, setLoadWeight]   = useState(5.0);
  const [numLegs, setNumLegs]         = useState(2);
  const [slingAngle, setSlingAngle]   = useState(45);
  const [slingType, setSlingType]     = useState("wireSlings");
  const [slingGrade, setSlingGrade]   = useState("6x19 IWRC - Grade 1770");
  const [slingSizeIdx, setSlingSizeIdx] = useState(3);
  const [dynFactor, setDynFactor]     = useState(1.0);

  const angleRad   = (slingAngle*Math.PI)/180;
  const modeFactor = Math.cos(angleRad);
  const tensionPerLeg = numLegs>1 ? (loadWeight*dynFactor)/(numLegs*modeFactor) : loadWeight*dynFactor;
  const selectedSlingData = LEEA_DATA[slingType]?.grades[slingGrade]?.rows||[];
  const selectedSlingRow  = selectedSlingData[slingSizeIdx]||null;
  const slingSwl   = selectedSlingRow ? selectedSlingRow.swl1 : 0;
  const utilisation = slingSwl>0 ? (tensionPerLeg/slingSwl)*100 : 0;
  const overload   = utilisation>100;
  const nearLimit  = utilisation>85;
  const utilizationColor = overload?"#ef4444":nearLimit?"#f59e0b":"#22d3ee";

  const inputStyle = {background:"#0d1f35",border:"1px solid #1e3a5f",color:"#e2e8f0",borderRadius:4,padding:"6px 10px",fontFamily:"var(--font-mono)",fontSize:13,width:"100%"};

  return (
    <LeaTabShell>
      <div className="fade-in">
        <div style={{marginBottom:18}}>
          <h2 style={{fontFamily:"var(--font-display)",fontSize:22,fontWeight:800,color:"#f59e0b",margin:0,letterSpacing:2}}>INTERACTIVE LOAD CALCULATOR</h2>
          <p style={{color:"#64748b",fontSize:12,margin:"4px 0 0",letterSpacing:1,fontFamily:"var(--font-mono)"}}>Dynamic sling tension and utilisation — LEEA / BS EN standards</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"350px 1fr",gap:20,alignItems:"start"}}>
          {/* Input Panel */}
          <div className="dark-card" style={{padding:"20px"}}>
            <div className="dark-section-label" style={{marginBottom:18}}>⚙️ LIFT PARAMETERS</div>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:6,fontFamily:"var(--font-mono)"}}>LOAD WEIGHT (t)</label>
              <input type="number" min="0.1" max="500" step="0.1" value={loadWeight} onChange={e=>setLoadWeight(parseFloat(e.target.value)||0)} style={inputStyle}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:6,fontFamily:"var(--font-mono)"}}>DYNAMIC FACTOR — {dynFactor.toFixed(2)}×</label>
              <input type="range" min="1.0" max="2.0" step="0.05" value={dynFactor} onChange={e=>setDynFactor(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#f59e0b"}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#334e7a",marginTop:2,fontFamily:"var(--font-mono)"}}>
                <span>1.0 Static</span><span>1.3 Slow</span><span>2.0 Dynamic</span>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:8,fontFamily:"var(--font-mono)"}}>NUMBER OF SLING LEGS</label>
              <div style={{display:"flex",gap:8}}>
                {[1,2,3,4].map(n=>(
                  <button key={n} onClick={()=>setNumLegs(n)} style={{flex:1,padding:"10px 4px",background:numLegs===n?"#0d2240":"#0a1628",border:`1px solid ${numLegs===n?"#f59e0b":"#1e3a5f"}`,color:numLegs===n?"#f59e0b":"#64748b",borderRadius:6,cursor:"pointer",fontFamily:"var(--font-display)",fontWeight:800,fontSize:18}}>{n}</button>
                ))}
              </div>
            </div>
            {numLegs>1 && (
              <div style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:6,fontFamily:"var(--font-mono)"}}>SLING ANGLE FROM VERTICAL — {slingAngle}°</label>
                <input type="range" min="0" max="60" step="5" value={slingAngle} onChange={e=>setSlingAngle(parseInt(e.target.value))} style={{width:"100%",accentColor:"#f59e0b"}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#334e7a",marginTop:2,fontFamily:"var(--font-mono)"}}>
                  <span>0° Ideal</span><span>30°</span><span>45° Std</span><span>60° Max</span>
                </div>
              </div>
            )}
            <div style={{borderTop:"1px solid #1e3a5f",paddingTop:16,marginTop:4}}>
              <div className="dark-section-label" style={{fontSize:12,marginBottom:12}}>SELECT SLING FOR VERIFICATION</div>
              <div style={{marginBottom:10}}>
                <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:4,fontFamily:"var(--font-mono)"}}>SLING TYPE</label>
                <select value={slingType} onChange={e=>{setSlingType(e.target.value);setSlingGrade(Object.keys(LEEA_DATA[e.target.value].grades)[0]);setSlingSizeIdx(0);}} style={{...inputStyle,cursor:"pointer"}}>
                  {Object.entries(LEEA_DATA).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
                </select>
              </div>
              <div style={{marginBottom:10}}>
                <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:4,fontFamily:"var(--font-mono)"}}>GRADE</label>
                <select value={slingGrade} onChange={e=>{setSlingGrade(e.target.value);setSlingSizeIdx(0);}} style={{...inputStyle,cursor:"pointer"}}>
                  {Object.keys(LEEA_DATA[slingType].grades).map(g=><option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:"block",fontSize:10,color:"#475569",letterSpacing:2,marginBottom:4,fontFamily:"var(--font-mono)"}}>SIZE</label>
                <select value={slingSizeIdx} onChange={e=>setSlingSizeIdx(parseInt(e.target.value))} style={{...inputStyle,cursor:"pointer"}}>
                  {(LEEA_DATA[slingType]?.grades[slingGrade]?.rows||[]).map((row,i)=>{
                    const keyFirst=LEEA_DATA[slingType].keys[0];
                    return <option key={i} value={i}>{row[keyFirst]}</option>;
                  })}
                </select>
              </div>
            </div>
          </div>

          {/* Results Panel */}
          <div>
            <div className="dark-card" style={{padding:"12px",marginBottom:16}}>
              <LiftDiagram legs={numLegs} angleDeg={slingAngle} load={loadWeight*dynFactor} tension={tensionPerLeg} swl={slingSwl}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:16}}>
              <div className="dark-card" style={{padding:"16px 18px"}}>
                <div style={{fontSize:10,color:"#475569",letterSpacing:2,marginBottom:8,fontFamily:"var(--font-mono)"}}>⬆️ TENSION PER LEG</div>
                <div style={{fontFamily:"var(--font-display)",fontSize:36,fontWeight:800,color:"#22d3ee",lineHeight:1}}>{tensionPerLeg.toFixed(3)}</div>
                <div style={{fontSize:11,color:"#475569",fontFamily:"var(--font-mono)"}}>tonnes</div>
              </div>
              <div className="dark-card" style={{padding:"16px 18px"}}>
                <div style={{fontSize:10,color:"#475569",letterSpacing:2,marginBottom:8,fontFamily:"var(--font-mono)"}}>🎯 SLING SWL</div>
                <div style={{fontFamily:"var(--font-display)",fontSize:36,fontWeight:800,color:"#f59e0b",lineHeight:1}}>{slingSwl>0?slingSwl.toFixed(2):"—"}</div>
                <div style={{fontSize:11,color:"#475569",fontFamily:"var(--font-mono)"}}>tonnes 1-leg</div>
              </div>
            </div>
            <div className="dark-card" style={{border:`1px solid ${utilizationColor}`,padding:"16px 18px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontFamily:"var(--font-display)",fontSize:13,fontWeight:700,color:"#94a3b8",letterSpacing:2}}>UTILISATION</span>
                <span style={{fontFamily:"var(--font-display)",fontSize:28,fontWeight:800,color:utilizationColor}}>{slingSwl>0?`${utilisation.toFixed(1)}%`:"N/A"}</span>
              </div>
              <div style={{height:14,background:"#0a1628",borderRadius:7,overflow:"hidden"}}>
                <div style={{height:14,borderRadius:7,width:`${Math.min(utilisation,100)}%`,background:utilizationColor,transition:"width 0.4s ease, background 0.3s",boxShadow:`0 0 12px ${utilizationColor}88`}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#334e7a",marginTop:4,fontFamily:"var(--font-mono)"}}>
                <span>0%</span><span style={{color:"#f59e0b"}}>85% Advisory</span><span style={{color:"#ef4444"}}>100% LIMIT</span>
              </div>
            </div>
            <div className="dark-card" style={{padding:"16px 18px"}}>
              <div className="dark-section-label" style={{fontSize:12,marginBottom:12}}>📊 CALCULATION BREAKDOWN</div>
              {[
                {label:"Load Weight",      value:`${loadWeight} t`},
                {label:"Dynamic Factor",   value:`×${dynFactor.toFixed(2)}`},
                {label:"Design Load",      value:`${(loadWeight*dynFactor).toFixed(3)} t`},
                {label:"No. Legs",         value:`${numLegs}`},
                ...(numLegs>1?[{label:"Angle from Vertical",value:`${slingAngle}°`},{label:"Mode Factor (cos θ)",value:`${modeFactor.toFixed(4)}`}]:[]),
                {label:"Tension per Leg",  value:`${tensionPerLeg.toFixed(4)} t`, highlight:true},
                {label:"Selected Sling SWL", value:`${slingSwl} t`, highlight:true},
                {label:"Utilisation",      value:`${slingSwl>0?utilisation.toFixed(1):"N/A"}%`, highlight:true},
              ].map((row,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #0d1a2e",...(row.highlight?{marginTop:4,paddingTop:10,borderTop:"1px solid #1e3a5f"}:{})}}>
                  <span style={{fontSize:11,color:"#64748b",fontFamily:"var(--font-mono)"}}>{row.label}</span>
                  <span style={{fontSize:12,fontWeight:700,color:row.highlight?"#f59e0b":"#94a3b8",fontFamily:"var(--font-mono)"}}>{row.value}</span>
                </div>
              ))}
            </div>
            {overload && (
              <div className="fade-in" style={{background:"#1a0505",border:"1px solid #ef4444",borderRadius:8,padding:"12px 16px",marginTop:14,fontSize:12,color:"#fca5a5",fontFamily:"var(--font-mono)"}}>
                ⛔ <strong>OVERLOAD CONDITION</strong> — Tension per leg exceeds sling SWL. Increase sling size, add legs, or reduce angle.
              </div>
            )}
            {nearLimit && !overload && (
              <div className="fade-in" style={{background:"#1a1000",border:"1px solid #f59e0b",borderRadius:8,padding:"12px 16px",marginTop:14,fontSize:12,color:"#fcd34d",fontFamily:"var(--font-mono)"}}>
                ⚠️ <strong>APPROACHING LIMIT</strong> — Utilisation above 85%. Review dynamic factors and consider a higher-rated sling.
              </div>
            )}
          </div>
        </div>
      </div>
    </LeaTabShell>
  );
}


    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
